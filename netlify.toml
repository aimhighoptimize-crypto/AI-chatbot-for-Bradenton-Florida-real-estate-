[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Clean path for the Twilio webhook -> Express app function.
# e.g. /api/twilio/status maps to the "status" route in src/routes/twilio.js
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/app/:splat"
  status = 200
